<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TTスーパーズコApp</title>
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#2C7A99; }
  #wrap { position:fixed; inset:0; overflow:hidden; }
  /* Google Apps Scriptの警告バー分だけ上へずらして隠す（--crop を端末で微調整） */
  :root { --crop: 44px; }
  #app { position:absolute; left:0; width:100%; border:0;
         top: calc(var(--crop) * -1); height: calc(100% + var(--crop)); }
</style>
</head>
<body>
<div id="wrap"><iframe id="app" title="施術室被り検出"></iframe></div>
<script>
  var EXEC = "https://script.google.com/macros/s/AKfycbwEpGPZhvGCbea6qoft-_TRCgvp5t0ieNf5kDCuFs9-1VYJi7r5RPgTPBM7AEBqPPLL4A/exec";
  var target = EXEC + (location.search || "");   // このページのクエリ(?view=...&staff=1 等)をそのまま渡す
  // Firefoxは他サイト(script.google.com)の埋め込みを安全のためブロックし「ページを開けません」になる。
  // その時はiframe埋め込みをやめ、直接そのアプリへ移動する（＝全ブラウザで開ける）。Chrome等は従来どおりiframe。
  if (/Firefox/i.test(navigator.userAgent)) {
    location.replace(target);
  } else {
    document.getElementById("app").src = target;
  }
</script>
</body>
</html>
