<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TTスーパーズコApp</title>
<style>
  html, body { margin:0; background:#2C7A99; }
  #root { min-height:100vh; }
  .boot { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; opacity:.85; font-family:"Segoe UI","Hiragino Sans",system-ui,sans-serif; }
</style>
</head>
<body>
<div id="root"><div class="boot">よみこみ中…</div></div>

<!-- 判定コア(detect)と、GASと共通の描画関数(renderHome_/renderPage_ など)。
     どちらも純JS。GAS専用の関数(doGet等)は同梱されるが呼ばれないだけ。
     ★?v=... はキャッシュ避け（GitHub PagesがCache-Control: max-age=600を付けるため、
     コード更新のたびにここの番号を上げないとスマホが古いJSを最大10分キャッシュし続ける）。
     更新手順：code.js/detect_core.jsを直したら、この2行の?v=も必ず同じ値へ上げてからpushする。 -->
<script src="detect_core.js?v=20260710q"></script>
<script src="code.js?v=20260710q"></script>
<script>
(function () {
  // 施術室被りデータは公開リポジトリに置かず、GASからJSONPで取得する
  // （このページはGASを表示しないので、Googleの「別ユーザー作成」警告バーは出ない）。
  var EXEC = "https://script.google.com/macros/s/AKfycbwEpGPZhvGCbea6qoft-_TRCgvp5t0ieNf5kDCuFs9-1VYJi7r5RPgTPBM7AEBqPPLL4A/exec";

  var params = new URLSearchParams(location.search);
  var view  = params.get('view') || 'home';
  var staff = params.get('staff') === '1';
  // 開発用URL（?dev=1）＝tile_settings.jsonの表示ON/OFF設定を無視して全ボタン表示。staff指定時は無効。
  var dev   = !staff && params.get('dev') === '1';
  var nail  = params.get('nail') === '1';
  var base  = location.pathname;   // メニュー内の遷移は同じページの ?view= を切り替えるだけ

  function runScripts(container) {
    // innerHTMLで挿入した<script>は実行されないので、作り直して実行する
    // （renderPage_ 内の TTSCRIPT_＝Android用 intent 差し替え などを効かせるため）。
    var list = container.querySelectorAll('script');
    for (var i = 0; i < list.length; i++) {
      var old = list[i];
      var s = document.createElement('script');
      if (old.src) s.src = old.src; else s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    }
  }

  function mount(html) {
    var root = document.getElementById('root');
    root.innerHTML = html;
    runScripts(root);
    window.scrollTo(0, 0);
  }

  function fail(msg) {
    document.getElementById('root').innerHTML =
      '<div class="boot" style="text-align:center;padding:1.5em;">' + msg + '</div>';
  }

  function showConflict() {
    // JSONPでデータ取得 → detect（判定）→ renderPage_（描画）。すべてブラウザ内で完結。
    // ★カード1件=ほぼ1画面(.card{min-height:90vh})はCSS側の担当。ここで全体を縮小合成して
    //   1画面に収める処理をすると、それを無効化して逆に「3件全部小さく1画面」に戻ってしまう
    //   （2026-07-10発見・過去にも同じ不具合が出ていたのはこれが原因）。ページは普通にスクロールさせる。
    window.__ttEvents = function (payload) {
      try {
        if (!payload || payload.error) { fail('データ取得エラー：' + ((payload && payload.error) || '不明')); return; }
        var res = detect(payload.events, nail, payload.date_from);
        mount(renderPage_(res.conflicts, res.meta, payload, nail, base, staff, dev));
      } catch (e) { fail('描画エラー：' + e); }
    };
    var s = document.createElement('script');
    s.src = EXEC + '?action=events&callback=__ttEvents&cb=' + Date.now();
    s.onerror = function () { fail('データに接続できませんでした。通信環境をご確認ください。'); };
    document.body.appendChild(s);
  }

  // lt/uriage も conflict と同じJSONP方式：GAS専用API(DriveApp等)はブラウザに無いので、
  // データだけJSONPで取り、描画は純JS(renderLtPage_/renderUriagePage_)で行う
  // （renderLT_/renderUriage_ をここで直接呼ぶとDriveApp未定義で必ずエラー表示になる＝2026-07-10修正）。
  function showLt() {
    window.__ttLt = function (payload) {
      try {
        if (!payload || payload.error) { fail('データ取得エラー：' + ((payload && payload.error) || '不明')); return; }
        mount(renderLtPage_(payload, base, staff, dev));
      } catch (e) { fail('描画エラー：' + e); }
    };
    var s = document.createElement('script');
    s.src = EXEC + '?action=lt&callback=__ttLt&cb=' + Date.now();
    s.onerror = function () { fail('データに接続できませんでした。通信環境をご確認ください。'); };
    document.body.appendChild(s);
  }

  function showUriage() {
    window.__ttUriage = function (payload) {
      try {
        if (!payload || payload.error) { mount(renderUriageError_((payload && payload.error) || '不明', base, staff, dev)); return; }
        mount(renderUriagePage_(payload, base, staff, dev));
      } catch (e) { fail('描画エラー：' + e); }
    };
    var s = document.createElement('script');
    s.src = EXEC + '?action=uriage&callback=__ttUriage&cb=' + Date.now();
    s.onerror = function () { fail('データに接続できませんでした。通信環境をご確認ください。'); };
    document.body.appendChild(s);
  }

  // ホーム画面のボタン表示ON/OFF設定（幹部用／スタッフ用）もJSONPで取得。
  // renderHome_（DriveApp使用）は①専用なので、②はrenderHomePage_を直接呼ぶ
  // （取得失敗時はtileSettings未指定＝renderHomePage_内のデフォルトにフォールバック）。
  function showHome() {
    window.__ttTileSettings = function (payload) {
      var tiles = (payload && payload.tiles) || null;
      mount(renderHomePage_(tiles, base, staff, dev));
    };
    var s = document.createElement('script');
    s.src = EXEC + '?action=tilesettings&callback=__ttTileSettings&cb=' + Date.now();
    s.onerror = function () { mount(renderHomePage_(null, base, staff, dev)); };
    document.body.appendChild(s);
  }

  if (view === 'lt') {
    showLt();
  } else if (view === 'uriage' && !staff) {
    showUriage();
  } else if (view === 'conflict') {
    showConflict();
  } else {
    showHome();
  }
})();
</script>
</body>
</html>
